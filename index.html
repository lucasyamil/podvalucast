<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>PodPlan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Firebase SDK (modular) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      updateProfile,
      onAuthStateChanged,
      signOut,
      EmailAuthProvider,
      reauthenticateWithCredential,
      updatePassword
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // ================================
    // 🔥 CONFIG FIREBASE
    // ================================
    const firebaseConfig = {
      apiKey: "AIzaSyB1A3M7jpH-mbFoW2ETneOyVhUKM1VIppk",
      authDomain: "plan-podcast.firebaseapp.com",
      databaseURL: "https://plan-podcast-default-rtdb.firebaseio.com",
      projectId: "plan-podcast",
      storageBucket: "plan-podcast.firebasestorage.app",
      messagingSenderId: "479892816401",
      appId: "1:479892816401:web:581d4a07a31872660c67b0",
      measurementId: "G-NGE8HKFLJE"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const auth = getAuth(app);

    const googleProvider = new GoogleAuthProvider();

    // ================================
    // 🔐 AUTH INIT
    // ================================
    function authInit() {
      onAuthStateChanged(auth, (user) => {
        if (user) {
          console.log("Usuario autenticado:", user);

          // Aquí puedes ocultar login y mostrar app
          document.getElementById("auth-screen").style.display = "none";
          document.getElementById("app").style.display = "block";

          // Ejemplo de uso
          document.getElementById("userName").innerText =
            user.displayName || user.email;

        } else {
          console.log("No hay sesión");

          document.getElementById("auth-screen").style.display = "block";
          document.getElementById("app").style.display = "none";
        }
      });
    }

    // ================================
    // 🔑 LOGIN EMAIL
    // ================================
    window.doLogin = async function () {
      const email = document.getElementById("loginEmail").value;
      const pass = document.getElementById("loginPass").value;

      try {
        await signInWithEmailAndPassword(auth, email, pass);
      } catch (err) {
        showError(err.message);
      }
    };

    // ================================
    // 🧾 REGISTER
    // ================================
    window.doRegister = async function () {
      const name = document.getElementById("regName").value;
      const email = document.getElementById("regEmail").value;
      const pass = document.getElementById("regPass").value;

      try {
        const res = await createUserWithEmailAndPassword(auth, email, pass);

        await updateProfile(res.user, {
          displayName: name
        });

      } catch (err) {
        showError(err.message);
      }
    };

    // ================================
    // 🔵 GOOGLE LOGIN
    // ================================
    window.doGoogleSignIn = async function () {
      try {
        await signInWithPopup(auth, googleProvider);
      } catch (err) {
        showError(err.message);
      }
    };

    // ================================
    // 🚪 LOGOUT
    // ================================
    window.doLogout = async function () {
      await signOut(auth);
    };

    // ================================
    // 🔐 CAMBIO PASSWORD
    // ================================
    window.changePassword = async function () {
      const user = auth.currentUser;

      const oldPass = document.getElementById("oldPass").value;
      const newPass = document.getElementById("newPass").value;

      try {
        const cred = EmailAuthProvider.credential(user.email, oldPass);
        await reauthenticateWithCredential(user, cred);

        await updatePassword(user, newPass);

        alert("Contraseña actualizada");
      } catch (err) {
        showError(err.message);
      }
    };

    function showError(msg) {
      const el = document.getElementById("authError");
      if (el) {
        el.innerText = msg;
      } else {
        alert(msg);
      }
    }

    // ================================
    // 🚀 INIT
    // ================================
    window.addEventListener("DOMContentLoaded", authInit);
  </script>

  <style>
    body { font-family: Arial; }
    #app { display:none; }
    .box { max-width:400px; margin:auto; padding:20px; }
  </style>
</head>

<body>

  <!-- ============================= -->
  <!-- AUTH UI -->
  <!-- ============================= -->
  <div id="auth-screen" class="box">
    <h2>Login</h2>

    <input id="loginEmail" placeholder="Email"><br><br>
    <input id="loginPass" type="password" placeholder="Password"><br><br>

    <button onclick="doLogin()">Iniciar sesión</button>
    <button onclick="doGoogleSignIn()">Google</button>

    <h3>Registro</h3>

    <input id="regName" placeholder="Nombre"><br><br>
    <input id="regEmail" placeholder="Email"><br><br>
    <input id="regPass" type="password" placeholder="Password"><br><br>

    <button onclick="doRegister()">Registrarse</button>

    <p id="authError" style="color:red;"></p>
  </div>

  <!-- ============================= -->
  <!-- APP -->
  <!-- ============================= -->
  <div id="app" class="box">
    <h2>Bienvenido</h2>
    <p id="userName"></p>

    <button onclick="doLogout()">Cerrar sesión</button>

    <h3>Cambiar contraseña</h3>
    <input id="oldPass" type="password" placeholder="Actual"><br><br>
    <input id="newPass" type="password" placeholder="Nueva"><br><br>
    <button onclick="changePassword()">Actualizar</button>
  </div>

</body>
</html>
