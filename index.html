<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PodPlan</title>

<style>
/* ===== MOBILE FIRST RESET ===== */
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f172a;
  color: #fff;
}

/* ===== TOPBAR ===== */
.topbar {
  position: fixed;
  top: 0;
  width: 100%;
  padding: env(safe-area-inset-top) 16px 12px;
  background: #020617;
  z-index: 10;
  text-align: center;
  font-weight: 600;
}

/* ===== MAIN ===== */
main {
  padding: 80px 16px 90px;
}

/* ===== INPUTS ===== */
input, button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  margin-bottom: 10px;
  font-size: 16px;
}

input {
  background: #1e293b;
  color: #fff;
}

button {
  background: #22c55e;
  color: #000;
  font-weight: bold;
}

/* ===== CARD ===== */
.card {
  background: #1e293b;
  padding: 16px;
  border-radius: 16px;
  margin-bottom: 12px;
}

/* ===== BOTTOM NAV ===== */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  padding: 10px;
  background: #020617;
  display: flex;
  justify-content: space-around;
}

.nav button {
  background: none;
  color: #fff;
  font-size: 12px;
}

/* ===== LOGIN ===== */
.auth {
  max-width: 400px;
  margin: auto;
}

.hidden { display: none; }

</style>
</head>

<body>

<div class="topbar" id="title">PodPlan</div>

<main>

<!-- LOGIN -->
<div id="authView" class="auth">
  <h2>Iniciar sesión</h2>
  <input id="loginEmail" placeholder="Email">
  <input id="loginPass" type="password" placeholder="Contraseña">
  <button onclick="doLogin()">Entrar</button>
  <button onclick="doGoogleSignIn()">Google</button>

  <h3>Registrarse</h3>
  <input id="regName" placeholder="Nombre">
  <input id="regEmail" placeholder="Email">
  <input id="regPass" type="password" placeholder="Contraseña">
  <button onclick="doRegister()">Crear cuenta</button>
</div>

<!-- APP -->
<div id="appView" class="hidden">

  <div class="card">
    <h3 id="userName"></h3>
    <p id="userEmail"></p>
    <button onclick="doLogout()">Cerrar sesión</button>
  </div>

</div>

</main>

<div class="nav">
  <button onclick="setView('home')">Home</button>
  <button onclick="setView('profile')">Perfil</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  updateProfile,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* ===== FIREBASE CONFIG ===== */
const firebaseConfig = {
  apiKey: "AIzaSyB1A3M7jpH-mbFoW2ETneOyVhUKM1VIppk",
  authDomain: "plan-podcast.firebaseapp.com",
  databaseURL: "https://plan-podcast-default-rtdb.firebaseio.com",
  projectId: "plan-podcast",
  storageBucket: "plan-podcast.firebasestorage.app",
  messagingSenderId: "479892816401",
  appId: "1:479892816401:web:581d4a07a31872660c67b0",
  measurementId: "G-NGE8HKFLJE"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

/* ===== AUTH INIT ===== */
onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById("authView").classList.add("hidden");
    document.getElementById("appView").classList.remove("hidden");

    document.getElementById("userName").innerText = user.displayName || "Usuario";
    document.getElementById("userEmail").innerText = user.email;
  } else {
    document.getElementById("authView").classList.remove("hidden");
    document.getElementById("appView").classList.add("hidden");
  }
});

/* ===== LOGIN ===== */
window.doLogin = async () => {
  const email = loginEmail.value;
  const pass = loginPass.value;

  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch (e) {
    alert(e.message);
  }
};

/* ===== REGISTER ===== */
window.doRegister = async () => {
  const name = regName.value;
  const email = regEmail.value;
  const pass = regPass.value;

  try {
    const res = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(res.user, { displayName: name });
  } catch (e) {
    alert(e.message);
  }
};

/* ===== GOOGLE ===== */
window.doGoogleSignIn = async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch (e) {
    alert(e.message);
  }
};

/* ===== LOGOUT ===== */
window.doLogout = async () => {
  await signOut(auth);
};

/* ===== NAV ===== */
window.setView = (v) => {
  document.getElementById("title").innerText = v.toUpperCase();
};

</script>

</body>
</html>
