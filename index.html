<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login con Google | PodPlan</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #f6f7fb 0%, #eef2ff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
      padding: 32px 24px;
      text-align: center;
    }

    .logo {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      margin: 0 auto 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111827;
      color: #fff;
      font-size: 28px;
      font-weight: bold;
    }

    h1 {
      font-size: 28px;
      color: #111827;
      margin-bottom: 8px;
    }

    p {
      color: #6b7280;
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 24px;
    }

    .google-btn,
    .logout-btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .google-btn {
      background: #111827;
      color: white;
    }

    .google-btn:hover {
      opacity: 0.92;
    }

    .logout-btn {
      background: #ef4444;
      color: white;
      margin-top: 16px;
    }

    .logout-btn:hover {
      opacity: 0.92;
    }

    .status {
      margin-top: 18px;
      font-size: 14px;
      min-height: 22px;
      color: #374151;
    }

    .user-box {
      display: none;
      margin-top: 24px;
      padding: 18px;
      border-radius: 16px;
      background: #f9fafb;
      text-align: left;
    }

    .user-header {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-header img {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      object-fit: cover;
      background: #e5e7eb;
    }

    .user-info h3 {
      font-size: 16px;
      color: #111827;
      margin-bottom: 4px;
    }

    .user-info span {
      font-size: 14px;
      color: #6b7280;
      word-break: break-word;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">P</div>
    <h1>Bienvenido a PodPlan</h1>
    <p>Inicia sesión sin contraseña usando tu cuenta de Google.</p>

    <button id="googleLoginBtn" class="google-btn">
      Continuar con Google
    </button>

    <div id="status" class="status"></div>

    <div id="userBox" class="user-box">
      <div class="user-header">
        <img id="userPhoto" src="" alt="Foto de perfil" />
        <div class="user-info">
          <h3 id="userName">Usuario</h3>
          <span id="userEmail">correo@ejemplo.com</span>
        </div>
      </div>

      <button id="logoutBtn" class="logout-btn">
        Cerrar sesión
      </button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      signOut,
      onAuthStateChanged,
      setPersistence,
      browserLocalPersistence
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getAnalytics,
      isSupported
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB1A3M7jpH-mbFoW2ETneOyVhUKM1VIppk",
      authDomain: "plan-podcast.firebaseapp.com",
      databaseURL: "https://plan-podcast-default-rtdb.firebaseio.com",
      projectId: "plan-podcast",
      storageBucket: "plan-podcast.firebasestorage.app",
      messagingSenderId: "479892816401",
      appId: "1:479892816401:web:581d4a07a31872660c67b0",
      measurementId: "G-NGE8HKFLJE"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const googleLoginBtn = document.getElementById("googleLoginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const statusEl = document.getElementById("status");
    const userBox = document.getElementById("userBox");
    const userName = document.getElementById("userName");
    const userEmail = document.getElementById("userEmail");
    const userPhoto = document.getElementById("userPhoto");

    async function initAnalytics() {
      try {
        const supported = await isSupported();
        if (supported) {
          getAnalytics(app);
        }
      } catch (error) {
        console.warn("Analytics no disponible:", error);
      }
    }

    async function initAuth() {
      try {
        await setPersistence(auth, browserLocalPersistence);
      } catch (error) {
        console.error("Error configurando persistencia:", error);
      }
    }

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.style.color = isError ? "#dc2626" : "#374151";
    }

    function showLoggedOut() {
      googleLoginBtn.classList.remove("hidden");
      userBox.style.display = "none";
      userName.textContent = "";
      userEmail.textContent = "";
      userPhoto.src = "";
      setStatus("No has iniciado sesión.");
    }

    function showLoggedIn(user) {
      googleLoginBtn.classList.add("hidden");
      userBox.style.display = "block";

      userName.textContent = user.displayName || "Usuario sin nombre";
      userEmail.textContent = user.email || "Sin correo";
      userPhoto.src = user.photoURL || "https://via.placeholder.com/52";
      userPhoto.alt = user.displayName ? `Foto de ${user.displayName}` : "Foto de perfil";

      setStatus("Sesión iniciada correctamente.");
    }

    googleLoginBtn.addEventListener("click", async () => {
      try {
        setStatus("Abriendo Google...");
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        showLoggedIn(user);

        // Redirección opcional:
        // window.location.href = "/dashboard.html";
      } catch (error) {
        console.error(error);

        if (error.code === "auth/popup-closed-by-user") {
          setStatus("Cerraste la ventana antes de completar el acceso.", true);
        } else if (error.code === "auth/popup-blocked") {
          setStatus("El navegador bloqueó la ventana emergente. Habilita popups e inténtalo de nuevo.", true);
        } else if (error.code === "auth/unauthorized-domain") {
          setStatus("Este dominio no está autorizado en Firebase.", true);
        } else {
          setStatus("No se pudo iniciar sesión con Google.", true);
        }
      }
    });

    logoutBtn.addEventListener("click", async () => {
      try {
        await signOut(auth);
        showLoggedOut();
      } catch (error) {
        console.error(error);
        setStatus("No se pudo cerrar sesión.", true);
      }
    });

    onAuthStateChanged(auth, (user) => {
      if (user) {
        showLoggedIn(user);
      } else {
        showLoggedOut();
      }
    });

    await initAuth();
    await initAnalytics();
  </script>
</body>
</html>
